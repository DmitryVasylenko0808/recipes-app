services:
  postgres: 
    image: postgres:18-alpine 
    restart: always 
    environment: 
      POSTGRES_USER: user 
      POSTGRES_PASSWORD: 1234 
      POSTGRES_DB: recipes 
    ports: 
      - "5432:5432"
    networks: 
      - db-network
    volumes: 
      - postgres_data:/var/lib/postgresql/data

  server:
    build: ./server
    ports:
      - "4000:4000"
    env_file:
      - ./server/.env.prod
    networks:
      - db-network
    volumes:
      - uploads_data:/usr/src/app/uploads
    depends_on:
      - postgres

networks: 
  db-network: 
volumes: 
  postgres_data:
  uploads_data: