services:
  postgres_dev: 
    image: postgres:18-alpine 
    restart: always 
    environment: 
      POSTGRES_USER: user 
      POSTGRES_PASSWORD: 1234 
      POSTGRES_DB: recipes_dev 
      PGDATA: /var/lib/postgresql/data
    ports: 
      - "5432:5432"
    networks: 
      - db-network
    volumes: 
      - postgres_data_dev:/var/lib/postgresql/data

networks: 
  db-network: 
volumes: 
  postgres_data_dev: